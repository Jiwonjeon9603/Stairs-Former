
# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000


runner: "mt_episode"

buffer_size: 5000


# update the target network every _ steps
target_update_interval: 80

# use the Q_Learner to train
agent_output_type: "q"
learner: "stairs_learner"
double_q: True
mixer: "mt_qattn"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

name: "STAIRS-Former"

# agent type
agent: "mt_stairs"

# mac
mac: "mt_stairs_mac"

# params about observation decomposition
id_length: 4
max_agent: 15

# params about trans mixing network
entity_embed_dim: 64
attn_embed_dim: 8


pretrain_steps: 0
pretrain: True
type_conservative: "norm"

head: 1
depth: 1

token_dropout: 0.1
high_step: 5

h_cycles: 2
l_cycles: 1

n_hist_tokens: 2