
# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000


runner: "mt_episode"

buffer_size: 5000


# update the target network every _ steps
target_update_interval: 80

# use the Q_Learner to train
agent_output_type: "q"
learner: "updet_learner"
double_q: True
mixer: "mt_qattn"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

name: "Hier_Reasoning"

# agent type
agent: "mt_hr"

# mac
mac: "mt_hr_mac"

# params about observation decomposition
id_length: 4
max_agent: 15

# params about trans mixing network
entity_embed_dim: 64
attn_embed_dim: 8

skill_dim: 5
c_step: 1
beta: 0.01
coef_conservative: 5.0
pretrain_steps: 0
pretrain: True
type_conservative: "norm"

head: 1
depth: 2

token_dropout: 0.1

bc: True

attention_heatmap: False
heatmap_batch_indices: [0]
heatmap_num_plots: 10


gru_history: False
no_history: False
hier_history: True
high_step: 5

algo_name: "Hier_Reasoning"