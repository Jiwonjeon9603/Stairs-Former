
# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000


runner: "mt_episode"

buffer_size: 5000


# update the target network every _ steps
target_update_interval: 80

# use the Q_Learner to train
agent_output_type: "q"
learner: "updet_learner"
double_q: True
mixer: "mt_qattn"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

name: "updet-m"

# agent type
agent: "mt_updet"

# mac
mac: "mt_updet_mac"

# params about observation decomposition
id_length: 4
max_agent: 15

# params about trans mixing network
entity_embed_dim: 64
attn_embed_dim: 8

skill_dim: 5
c_step: 1
beta: 0.01
coef_conservative: 5.0
pretrain_steps: 0
pretrain: True
type_conservative: "norm"

head: 1
depth: 1

token_dropout: 0.1

bc: True
virtual_task: True
virtual_individual: False
virtual_map: "3m"
virtual_n_enemies: 1
virtual_n_allies: 1
virtual_timeago: 1  # 0: same time step, +1: one step later, -1: one step before
virtual_ratio: 2 # Original 24 batches -> Fake 12 batches
virtual_avail_none: True

virtual_lam: 0.2

algo_name: "Updet-bc"